<!-- Modal overlay for query panels -->
<div id="queryModalOverlay" class="query-modal-overlay"></div>

<!-- Query Details Side Panel -->
<div id="queryPanel" class="query-panel">
  <!-- Toggle Button -->
  <button id="queryPanelToggle" class="query-panel-toggle" type="button" aria-label="Show Query Panel" title="Show query panel">
    <i class="bi bi-chevron-left"></i>
    <span id="queryBadge" class="query-badge" style="display: none;">0</span>
  </button>
  
  <!-- Panel Content -->
  <div class="query-panel-content">
    <!-- Header -->
    <div class="query-panel-header">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <h5 class="mb-0">
            <i class="bi bi-code-slash me-2"></i>
            Query Monitor
          </h5>
          <small class="text-muted">Real-time query tracking</small>
        </div>
        <button id="clearQueriesBtn" class="btn btn-sm btn-outline-secondary" type="button" title="Clear all queries">
          <i class="bi bi-trash3"></i>
        </button>
      </div>
    </div>
    
    <!-- Query List -->
    <div class="query-panel-body">
      <div id="queryList" class="query-list">
        <!-- Default message when no queries -->
        <div id="noQueries" class="no-queries text-center text-muted py-4">
          <i class="bi bi-database" style="font-size: 2rem; opacity: 0.5;"></i>
          <p class="mb-0 mt-2">No queries executed yet</p>
          <small>Queries will appear here as they run</small>
        </div>
      </div>
    </div>
    
    <!-- Footer with stats -->
    <div class="query-panel-footer">
      <div class="row text-center">
        <div class="col-6">
          <small class="text-muted">HCD Queries</small>
          <div id="hcdQueryCount" class="fw-bold">0</div>
        </div>
        <div class="col-6">
          <small class="text-muted">Presto Queries</small>
          <div id="prestoQueryCount" class="fw-bold">0</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Query Details Panel -->
<div id="queryDetailsPanel" class="query-details-panel">
  <!-- Panel Content -->
  <div class="query-details-panel-content">
    <!-- Header -->
    <div class="query-details-panel-header">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <h5 class="mb-0" id="queryDetailsTitle">
            <i class="bi bi-zoom-in me-2"></i>
            Query Details
          </h5>
          <small class="text-muted" id="queryDetailsSubtitle">Select a query to view details</small>
        </div>
        <button id="closeQueryDetailsBtn" class="btn btn-sm btn-outline-secondary" type="button" title="Close details">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>
    </div>
    
    <!-- Details Content -->
    <div class="query-details-panel-body">
      <div id="queryDetailsContent">
        <div class="text-center text-muted py-4">
          <i class="bi bi-info-circle" style="font-size: 2rem; opacity: 0.5;"></i>
          <p class="mb-0 mt-2">No query selected</p>
          <small>Click on a query in the monitor panel to view details</small>
        </div>
      </div>
    </div>
  </div>
</div>
