<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login - Affiliate Junction Demo</title>
    {% include "partials/html_head.html" %}
    <link rel="stylesheet" href="/assets/css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-form-wrapper">
            <div class="login-header">
                <h1 class="login-title">
                    <i class="bi bi-graph-up-arrow me-2"></i>
                    Affiliate Junction
                </h1>
                <p class="login-subtitle">watsonx.data Analytics Demo</p>
            </div>
            
            <form id="loginForm" class="login-form">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-person-fill"></i>
                        </span>
                        <input 
                            type="text" 
                            class="form-control" 
                            id="username" 
                            name="username" 
                            required
                            autocomplete="username"
                        >
                    </div>
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-lock-fill"></i>
                        </span>
                        <input 
                            type="password" 
                            class="form-control" 
                            id="password" 
                            name="password" 
                            required
                            autocomplete="current-password"
                        >
                    </div>
                </div>
                
                <div id="errorMessage" class="alert alert-danger d-none" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i>
                    <span id="errorText"></span>
                </div>
                
                <button type="submit" class="btn btn-primary login-button" id="loginButton">
                    <span class="login-button-text">
                        <i class="bi bi-box-arrow-in-right me-2"></i>
                        Sign In
                    </span>
                    <span class="login-button-loading d-none">
                        <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                        Signing In...
                    </span>
                </button>
            </form>
            
            <div class="login-footer">
                <small class="text-muted">
                    <i class="bi bi-shield-lock-fill me-1"></i>
                    Secure authentication powered by watsonx.data
                </small>
            </div>
        </div>
    </div>
    
    <!-- Login JavaScript -->
    <script src="/assets/js/login.js"></script>
</body>
</html>
